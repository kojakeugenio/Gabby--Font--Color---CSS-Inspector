<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gabby</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <div class="popup__brand">
        <img class="popup__logo" src="logo.png" alt="" />
        <div>
          <h1 class="popup__title">Gabby</h1>
          <p class="popup__subtitle">Font, color, and CSS inspection for live pages.</p>
        </div>
      </div>

      <div class="popup__actions">
        <button class="popup__button popup__button--primary" id="popup-open-widget">
          Open Floating Panel
        </button>
      </div>

      <section class="popup__card">
        <div class="popup__developer">
          <div class="popup__developer-info">
            <span class="popup__developer-label">Developer</span>
            <span class="popup__developer-name">Kojak Eugenio</span>
          </div>
          <div class="popup__developer-socials">
            <a href="https://github.com/kojakeugenio" target="_blank" class="popup__social-link" title="GitHub">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </a>
            <a href="https://www.facebook.com/snowden.presso/" target="_blank" class="popup__social-link" title="Facebook">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
            </a>
          </div>
        </div>
      </section>

      <section class="popup__card">
        <label class="popup__toggle" for="popup-auto-show">
          <div class="popup__toggle-copy">
            <span class="popup__toggle-title">Show floating icon automatically</span>
            <span class="popup__toggle-text">
              Keep the Gabby icon visible on supported pages until you turn this off.
            </span>
          </div>
          <input type="checkbox" id="popup-auto-show" />
        </label>
      </section>

      <p class="popup__status" id="popup-status">Ready.</p>
    </main>

    <script src="lib/messaging.js"></script>
    <script src="lib/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
